<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="100%" font-family="system-ui" role="img" aria-label="Phinq architecture diagram: agent tool calls pass through a governance proxy that classifies, holds, and audits actions before reaching the LLM provider.">
  <defs>
    
    <marker id="ar-t" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#f0ede8"></path></marker>
    <marker id="ar-g" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#4ade80"></path></marker>
    <marker id="ar-a" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#fbbf24"></path></marker>
    <marker id="ar-r" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#f87171"></path></marker>
  </defs>

  
  <rect x="0" y="0" width="1600" height="600" fill="#0a0a0a"></rect>

  
  <g transform="translate(40,20) scale(0.62)">
    <path d="M11 56 V29 A21 21 0 0 1 53 29 V56" fill="none" stroke="#f0ede8" stroke-width="10" stroke-linecap="round"></path>
