    <text x="552" y="539" class="m" font-size="15" fill="#888884">…</text>
  </g>

  
  <line x1="550" y1="322" x2="550" y2="346" stroke="#f0ede8" stroke-width="2" marker-end="url(#ar-t)"></line>
  <line x1="550" y1="432" x2="550" y2="452" stroke="#f0ede8" stroke-width="2" marker-end="url(#ar-t)"></line>

  
  <rect x="40" y="250" width="270" height="200" rx="16" fill="#141414" stroke="#2a2a28" stroke-width="1.5"></rect>
  <rect x="64" y="272" width="26" height="26" rx="7" fill="#1f1f1d" stroke="#2a2a28" stroke-width="1"></rect>
  <text x="77" y="290" text-anchor="middle" class="m" font-size="14" fill="#f0ede8">1</text>
  <text x="102" y="291" class="h" font-size="22" font-weight="700" fill="#f0ede8">Agent</text>
  <text x="64" y="324" class="m" font-size="13" fill="#888884">autonomous AI agent</text>
  <rect x="64" y="338" width="222" height="40" rx="9" fill="#0f0f0f" stroke="#2a2a28" stroke-width="1.5"></rect>
  <text x="80" y="363" class="m" font-size="15" fill="#f0ede8">delete_file(path=…)</text>
  <rect x="64" y="392" width="124" height="26" rx="13" fill="none" stroke="#fbbf24" stroke-width="1.3"></rect>
  <circle cx="80" cy="405" r="3" fill="#fbbf24"></circle>
  <text x="92" y="409" class="m" font-size="12.5" fill="#fbbf24">irreversible</text>

  
  <rect x="980" y="56" width="360" height="168" rx="16" fill="#141414" stroke="#2a2a28" stroke-width="1.5"></rect>
  <rect x="1004" y="80" width="26" height="26" rx="7" fill="#1f1f1d" stroke="#2a2a28" stroke-width="1"></rect>
  <text x="1017" y="98" text-anchor="middle" class="m" font-size="14" fill="#f0ede8">3</text>
  <text x="1042" y="100" class="h" font-size="22" font-weight="700" fill="#f0ede8">Human operator</text>
  <text x="1004" y="132" class="m" font-size="13" fill="#888884">review and decide · Telegram or CLI</text>
  <rect x="1004" y="162" width="150" height="40" rx="9" fill="none" stroke="#f87171" stroke-width="1.4"></rect>
  <text x="1079" y="187" text-anchor="middle" class="m" font-size="14" fill="#f87171">deny ✕</text>
  <rect x="1170" y="162" width="150" height="40" rx="9" fill="none" stroke="#4ade80" stroke-width="1.4"></rect>
  <text x="1245" y="187" text-anchor="middle" class="m" font-size="14" fill="#4ade80">approve ✓</text>

  
  <rect x="920" y="250" width="220" height="42" rx="10" fill="#141414" stroke="#f87171" stroke-width="1.3" stroke-opacity="0.6"></rect>
  <text x="1030" y="276" text-anchor="middle" class="m" font-size="13" fill="#f87171" fill-opacity="0.9">blocked — not executed</text>

  
  <rect x="1240" y="330" width="320" height="150" rx="16" fill="#141414" stroke="#2a2a28" stroke-width="1.5"></rect>
  <rect x="1264" y="354" width="26" height="26" rx="7" fill="#1f1f1d" stroke="#2a2a28" stroke-width="1"></rect>
  <text x="1277" y="372" text-anchor="middle" class="m" font-size="14" fill="#f0ede8">4</text>
  <text x="1302" y="374" class="h" font-size="22" font-weight="700" fill="#f0ede8">LLM provider</text>
  <text x="1264" y="408" class="m" font-size="14" fill="#888884">OpenAI / Anthropic</text>
  <text x="1264" y="436" class="m" font-size="12.5" fill="#888884" fill-opacity="0.8">executes the request</text>

  
  <line x1="310" y1="350" x2="360" y2="350" stroke="#f0ede8" stroke-width="2" marker-end="url(#ar-t)"></line>

  
  <path d="M740,290 H860 V140 H980" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#ar-a)"></path>

  
  <line x1="740" y1="405" x2="1240" y2="405" stroke="#4ade80" stroke-width="2" marker-end="url(#ar-g)"></line>

  
  <path d="M1245,224 V300 H1400 V330" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#ar-g)"></path>

  
  <line x1="1030" y1="224" x2="1030" y2="250" stroke="#f87171" stroke-width="2" marker-end="url(#ar-r)"></line>

  
  <rect x="744" y="184" width="234" height="22" fill="#0a0a0a"></rect>
  <text x="861" y="200" text-anchor="middle" class="m" font-size="12.5" fill="#fbbf24">hold · irreversible / high risk</text>

  <rect x="880" y="394" width="216" height="22" fill="#0a0a0a"></rect>
  <text x="988" y="410" text-anchor="middle" class="m" font-size="13" fill="#4ade80">allow · reversible / low risk</text>

  <rect x="1171" y="250" width="148" height="22" fill="#0a0a0a"></rect>
  <text x="1245" y="266" text-anchor="middle" class="m" font-size="13" fill="#4ade80">if approved, continue</text>

</svg>