  </g>
  <text x="90" y="52" class="h" font-size="30" font-weight="700" fill="#f0ede8" letter-spacing="-0.5">phinq</text>
  <text x="1560" y="44" text-anchor="end" class="m" font-size="14" fill="#888884">fig 1 · request lifecycle</text>

  
  <rect x="360" y="150" width="380" height="430" rx="16" fill="#141414" stroke="#2a2a28" stroke-width="1.5"></rect>
  <g transform="translate(384,158) scale(0.42)">
    <path d="M11 56 V29 A21 21 0 0 1 53 29 V56" fill="none" stroke="#f0ede8" stroke-width="10" stroke-linecap="round"></path>
    <circle cx="32" cy="41" r="7" fill="#f0ede8"></circle>
  </g>
  <text x="416" y="184" class="h" font-size="20" font-weight="700" fill="#f0ede8">phinq proxy</text>
  <text x="416" y="208" class="m" font-size="13" fill="#888884">governance layer</text>
  <rect x="692" y="160" width="26" height="26" rx="7" fill="#1f1f1d" stroke="#2a2a28" stroke-width="1"></rect>
  <text x="705" y="178" text-anchor="middle" class="m" font-size="14" fill="#f0ede8">2</text>

  
  <rect x="384" y="236" width="332" height="86" rx="12" fill="#0f0f0f" stroke="#2a2a28" stroke-width="1.5"></rect>
  <text x="404" y="270" class="m" font-size="15" font-weight="500" fill="#f0ede8">classifier</text>
  <text x="404" y="296" class="m" font-size="13" fill="#888884">inspect and classify the action</text>

  
  <rect x="384" y="346" width="332" height="86" rx="12" fill="#0f0f0f" stroke="#2a2a28" stroke-width="1.5"></rect>
  <text x="404" y="380" class="m" font-size="15" font-weight="500" fill="#f0ede8">hold queue</text>
  <text x="404" y="406" class="m" font-size="13" fill="#888884">hold high-risk actions for approval</text>

  
  <rect x="384" y="452" width="332" height="108" rx="12" fill="#0f0f0f" stroke="#2a2a28" stroke-width="1.5"></rect>
  <text x="404" y="482" class="m" font-size="15" font-weight="500" fill="#f0ede8">audit log</text>
  <text x="404" y="506" class="m" font-size="13" fill="#888884">tamper-evident hash-chained log</text>
  <g>
    <rect x="404" y="524" width="18" height="18" rx="4" fill="#141414" stroke="#2a2a28" stroke-width="1.2"></rect>
